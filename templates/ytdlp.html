<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download from YouTube</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <div style="font-size: 24px; font-weight: bold; color: #1db954;">Spotify Clone</div>
        <div>
            <a href="{{ url_for('index') }}">Home</a>
            <a href="{{ url_for('search') }}">Discover</a>
            <a href="{{ url_for('upload') }}">Upload</a>
            <a href="{{ url_for('ytdlp_download') }}">Download</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h2>Download from YouTube</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="url" placeholder="Paste YouTube URL here..." required>
            <button type="submit">Download</button>
        </form>
    </div>
</body>
</html>
